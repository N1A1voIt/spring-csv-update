# Database type to Java type conversion mappings
conversions:
    # String types
    VARCHAR:
        javaType: java.lang.String
        converter: toString
    CHAR:
        javaType: java.lang.String
        converter: toString
    TEXT:
        javaType: java.lang.String
        converter: toString
    LONGTEXT:
        javaType: java.lang.String
        converter: toString
    MEDIUMTEXT:
        javaType: java.lang.String
        converter: toString
    TINYTEXT:
        javaType: java.lang.String
        converter: toString
    
    # Integer types
    INTEGER:
        javaType: java.lang.Integer
        converter: toInteger
    INT:
        javaType: java.lang.Integer
        converter: toInteger
    SMALLINT:
        javaType: java.lang.Integer
        converter: toInteger
    TINYINT:
        javaType: java.lang.Integer
        converter: toInteger
    MEDIUMINT:
        javaType: java.lang.Integer
        converter: toInteger
    BIGINT:
        javaType: java.lang.Long
        converter: toLong
    
    # Decimal types
    DECIMAL:
        javaType: java.math.BigDecimal
        converter: toBigDecimal
    NUMERIC:
        javaType: java.math.BigDecimal
        converter: toBigDecimal
    FLOAT:
        javaType: java.lang.Float
        converter: toFloat
    DOUBLE:
        javaType: java.lang.Double
        converter: toDouble
    
    # Boolean types
    BOOLEAN:
        javaType: java.lang.Boolean
        converter: toBoolean
    BIT:
        javaType: java.lang.Boolean
        converter: toBoolean
    
    # Date/Time types
    DATE:
        javaType: java.sql.Date
        converter: toDate
        formats:
            - yyyy-MM-dd
            - dd/MM/yyyy
            - MM/dd/yyyy
    TIME:
        javaType: java.sql.Time
        converter: toTime
        formats:
            - HH:mm:ss
    TIMESTAMP:
        javaType: java.sql.Timestamp
        converter: toTimestamp
        formats:
            - yyyy-MM-dd HH:mm:ss
            - dd/MM/yyyy HH:mm:ss
    DATETIME:
        javaType: java.sql.Timestamp
        converter: toTimestamp
        formats:
            - yyyy-MM-dd HH:mm:ss
            - dd/MM/yyyy HH:mm:ss
